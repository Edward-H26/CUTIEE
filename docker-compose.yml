# Local Neo4j for CUTIEE dev. Spin up with `docker compose up -d neo4j`.
# Browser UI at http://localhost:7474, Bolt at bolt://localhost:7687.
# Default password is the dev placeholder; override via `NEO4J_PASSWORD`
# in your shell or .env. Data lives in named volumes so host-side
# permissions cannot break the container, and `docker compose down -v`
# is the canonical way to wipe state between experiments.

services:
  neo4j:
    image: neo4j:5.24-community
    container_name: cutiee-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD:-cutiee-dev-password}"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_memory_heap_initial__size: "512m"
      NEO4J_dbms_memory_heap_max__size: "1G"
    volumes:
      - cutiee_neo4j_data:/data
      - cutiee_neo4j_logs:/logs
    healthcheck:
      # cypher-shell is bundled in the Neo4j image and gives a meaningful
      # readiness signal (driver auth + write path), unlike a bare HTTP
      # 200 from the browser console.
      test:
        - CMD-SHELL
        - "cypher-shell -u neo4j -p ${NEO4J_PASSWORD:-cutiee-dev-password} 'RETURN 1' || exit 1"
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s

volumes:
  cutiee_neo4j_data:
  cutiee_neo4j_logs:

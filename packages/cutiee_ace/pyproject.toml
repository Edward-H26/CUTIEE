[project]
name = "cutiee-ace"
version = "0.1.0"
description = "Self-evolving ACE memory framework + temporal context pruning for LLM agents"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Edward Hu", email = "qiranhu8@gmail.com" }]
keywords = ["llm", "agent", "memory", "ace", "context-pruning", "self-evolving"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
]

dependencies = [
    "numpy>=1.26",
]

[project.optional-dependencies]
embeddings = ["fastembed>=0.3"]
crypto = ["cryptography>=43.0"]
verifier = ["Pillow>=10.0"]                # perceptual-hash for StateVerifier
gemini = ["google-genai>=0.3"]             # LlmReflector + LlmActionDecomposer
all = ["fastembed>=0.3", "cryptography>=43.0", "Pillow>=10.0", "google-genai>=0.3"]

[project.urls]
Homepage = "https://github.com/Edward-H26/CUTIEE"
Repository = "https://github.com/Edward-H26/CUTIEE"
Issues = "https://github.com/Edward-H26/CUTIEE/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["cutiee_ace"]

[project]
name = "cutiee-cu"
version = "0.1.0"
description = "Computer Use runner for LLM agents — Gemini ComputerUse tool + Playwright"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Edward Hu", email = "qiranhu8@gmail.com" }]
keywords = ["llm", "agent", "computer-use", "gemini", "browser", "playwright"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
]

dependencies = [
    "google-genai>=0.3",
    "playwright>=1.45",
]

[project.optional-dependencies]
# Pair with cutiee-ace to unlock self-evolving memory + replay + state-verified
# mid-task replay. Cu runs fine standalone (verifier becomes a no-op).
ace = ["cutiee-ace>=0.2.0"]
all = ["cutiee-ace[all]>=0.2.0"]

[project.urls]
Homepage = "https://github.com/Edward-H26/CUTIEE"
Repository = "https://github.com/Edward-H26/CUTIEE"
Issues = "https://github.com/Edward-H26/CUTIEE/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["cutiee_cu"]

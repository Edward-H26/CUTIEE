<!doctype html>
<html><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:#fafafa;font-family:var(--mm-font-body);}
  .row{display:flex;gap:10px;}
  .sw{flex:1;border-radius:var(--mm-radius-lg);padding:14px 12px 12px;min-height:90px;display:flex;flex-direction:column;justify-content:space-between;border:1px solid #0000000f;}
  .name{font-weight:600;font-size:12px;line-height:1.1;}
  .hex{font-family:var(--mm-font-mono);font-size:10px;opacity:.8;}
</style></head>
<body>
<div class="row">
  <div class="sw" style="background:#1C1E2E;color:#fff;"><div><div class="name">fg-1</div><div class="hex">Primary text</div></div><div class="hex">#1C1E2E</div></div>
  <div class="sw" style="background:#0f172a;color:#fff;"><div><div class="name">fg-2</div><div class="hex">Landing body</div></div><div class="hex">#0f172a</div></div>
  <div class="sw" style="background:#6B7280;color:#fff;"><div><div class="name">muted</div><div class="hex">Secondary</div></div><div class="hex">#6B7280</div></div>
  <div class="sw" style="background:#94a3b8;color:#fff;"><div><div class="name">light</div><div class="hex">Eyebrow</div></div><div class="hex">#94a3b8</div></div>
  <div class="sw" style="background:#E5E7EB;color:#1C1E2E;"><div><div class="name">border</div><div class="hex">Solid</div></div><div class="hex">#E5E7EB</div></div>
  <div class="sw" style="background:#F5F6FA;color:#1C1E2E;"><div><div class="name">hover-bg</div><div class="hex">Rest hover</div></div><div class="hex">#F5F6FA</div></div>
  <div class="sw" style="background:#fdfdfd;color:#1C1E2E;border:1px solid #E5E7EB;"><div><div class="name">bg-subtle</div><div class="hex">Warm white</div></div><div class="hex">#fdfdfd</div></div>
</div>
</body></html>

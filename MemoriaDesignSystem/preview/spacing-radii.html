<!doctype html>
<html><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:#fff;font-family:var(--mm-font-body);display:flex;gap:28px;align-items:center;flex-wrap:wrap;}
  .box{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .tile{background:#6C86C0;}
  .l{font-family:var(--mm-font-mono);font-size:10px;color:#6B7280;}
</style></head>
<body>
<div class="box"><div class="tile" style="width:32px;height:32px;border-radius:4px;"></div><div class="l">4 / sm</div></div>
<div class="box"><div class="tile" style="width:40px;height:40px;border-radius:8px;"></div><div class="l">8 / md</div></div>
<div class="box"><div class="tile" style="width:48px;height:48px;border-radius:10px;"></div><div class="l">10 / btn</div></div>
<div class="box"><div class="tile" style="width:56px;height:56px;border-radius:12px;"></div><div class="l">12 / lg</div></div>
<div class="box"><div class="tile" style="width:64px;height:64px;border-radius:16px;"></div><div class="l">16 / xl ★</div></div>
<div class="box"><div class="tile" style="width:72px;height:72px;border-radius:20px;"></div><div class="l">20 / 2xl ★</div></div>
<div class="box"><div class="tile" style="width:64px;height:64px;border-radius:9999px;"></div><div class="l">pill</div></div>
</body></html>

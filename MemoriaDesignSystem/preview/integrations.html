<!doctype html>
<html><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:28px;background:#fff;font-family:var(--mm-font-body);display:flex;gap:22px;align-items:center;flex-wrap:wrap;}
  .tile{width:64px;height:64px;border-radius:16px;background:rgba(255,255,255,.65);border:1px solid rgba(255,255,255,.6);box-shadow:0 8px 24px rgba(108,134,192,.12);display:flex;align-items:center;justify-content:center;}
  .tile img{width:40px;height:40px;}
  .col{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .l{font-family:var(--mm-font-mono);font-size:10px;color:#6B7280;}
</style></head>
<body>
<div class="col"><div class="tile"><img src="../assets/integrations/slack.svg"></div><div class="l">Slack</div></div>
<div class="col"><div class="tile"><img src="../assets/integrations/notion.svg"></div><div class="l">Notion</div></div>
<div class="col"><div class="tile"><img src="../assets/integrations/github.svg"></div><div class="l">GitHub</div></div>
<div class="col"><div class="tile"><img src="../assets/integrations/gmail.svg"></div><div class="l">Gmail</div></div>
<div class="col"><div class="tile"><img src="../assets/integrations/gcal.svg"></div><div class="l">G Cal</div></div>
<div class="col"><div class="tile"><img src="../assets/integrations/discord.svg"></div><div class="l">Discord</div></div>
<div class="col"><div class="tile"><img src="../assets/integrations/telegram.svg"></div><div class="l">Telegram</div></div>
<div class="col"><div class="tile"><img src="../assets/integrations/whatsapp.svg"></div><div class="l">WhatsApp</div></div>
</body></html>

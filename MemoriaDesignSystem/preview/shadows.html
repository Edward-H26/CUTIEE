<!doctype html>
<html><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:28px;background:#fff;font-family:var(--mm-font-body);display:flex;gap:28px;flex-wrap:wrap;align-items:flex-end;}
  .item{display:flex;flex-direction:column;align-items:center;gap:12px;}
  .tile{width:80px;height:56px;border-radius:12px;background:#fff;border:1px solid rgba(0,0,0,.04);}
  .l{font-family:var(--mm-font-mono);font-size:10px;color:#6B7280;text-align:center;line-height:1.3;}
  .s1{box-shadow:0 1px 20px rgba(0,0,0,0.03);}
  .s2{box-shadow:0 4px 12px rgba(108,134,192,0.18);}
  .s3{box-shadow:0 8px 20px rgba(108,134,192,0.25);}
  .s4{box-shadow:0 12px 32px rgba(108,134,192,0.08);}
  .s5{box-shadow:0 18px 40px rgba(108,134,192,0.12);}
  .s6{box-shadow:0 10px 24px rgba(108,134,192,0.28);}
</style></head>
<body>
<div class="item"><div class="tile s1"></div><div class="l">1<br>Header</div></div>
<div class="item"><div class="tile s2"></div><div class="l">2<br>Btn rest</div></div>
<div class="item"><div class="tile s3"></div><div class="l">3<br>Btn hover</div></div>
<div class="item"><div class="tile s4"></div><div class="l">4<br>Card rest</div></div>
<div class="item"><div class="tile s5"></div><div class="l">5<br>Card hover</div></div>
<div class="item"><div class="tile s6"></div><div class="l">6<br>CTA</div></div>
</body></html>

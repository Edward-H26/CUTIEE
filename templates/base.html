{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CUTIEE{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #6C86C0;
            --primary-blue-end: #8B6CC0;
            --text-primary: #1e293b;
            --text-muted: #64748b;
            --border: rgba(108, 134, 192, 0.18);
            --bg-glass: rgba(255, 255, 255, 0.55);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Inter", sans-serif;
            color: var(--text-primary);
            background:
                radial-gradient(at 20% 10%, #ffe4f1 0%, transparent 55%),
                radial-gradient(at 80% 20%, #e0ecff 0%, transparent 60%),
                radial-gradient(at 60% 80%, #f3e9ff 0%, transparent 55%),
                linear-gradient(180deg, #f8fafc 0%, #eef2f7 100%);
            min-height: 100vh;
        }
        header {
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            backdrop-filter: blur(20px);
            background: rgba(255,255,255,0.45);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        header .brand {
            font-family: "Manrope", sans-serif;
            font-weight: 800;
            font-size: 20px;
            letter-spacing: -1px;
            text-decoration: none;
            background: linear-gradient(90deg, var(--primary-blue), var(--primary-blue-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        header nav a {
            margin-left: 12px;
            font-size: 14px;
            color: var(--text-muted);
            text-decoration: none;
        }
        header nav a:hover { color: var(--text-primary); }
        .cta {
            display: inline-block;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 600;
            text-decoration: none;
            color: #fff;
            background: linear-gradient(90deg, var(--primary-blue), var(--primary-blue-end));
            box-shadow: 0 8px 20px rgba(108,134,192,0.28);
        }
        .cta:hover { transform: translateY(-1px); }
        main { padding: 48px 32px; max-width: 1100px; margin: 0 auto; }
        .glass {
            backdrop-filter: blur(20px);
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <header>
        <a href="/" class="brand">CUTIEE</a>
        <nav>
            {% if user.is_authenticated %}
                <a href="{% url 'tasks:list' %}">Tasks</a>
                <a href="{% url 'memory_app:list' %}">Memory</a>
                <a href="{% url 'audit:list' %}">Audit</a>
                <form method="post" action="{% url 'account_logout' %}" style="display:inline">
                    {% csrf_token %}
                    <button type="submit" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:14px;">Log out</button>
                </form>
            {% else %}
                <a href="{% url 'account_login' %}" class="cta">Sign in</a>
            {% endif %}
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    {% block extra_js %}{% endblock %}
</body>
</html>

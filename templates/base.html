{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#6C86C0">
    <title>{% block title %}CUTIEE{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/cutiee.css' %}">
    <script src="https://unpkg.com/htmx.org@1.9.10" defer></script>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <header class="cutiee-header">
        <a href="/" class="cutiee-brand">CUTIEE</a>
        <nav class="cutiee-nav">
            {% if user.is_authenticated %}
                <a href="{% url 'tasks:list' %}">Tasks</a>
                <a href="{% url 'tasks:dashboard' %}">Dashboard</a>
                <a href="{% url 'memory_app:list' %}">Memory</a>
                <a href="{% url 'audit:list' %}">Audit</a>
                <form method="post" action="{% url 'account_logout' %}" style="display:inline">
                    {% csrf_token %}
                    <button type="submit" class="cutiee-btn-ghost cutiee-btn-sm">Log out</button>
                </form>
            {% else %}
                <a href="{% url 'account_login' %}" class="cta">Sign in</a>
            {% endif %}
        </nav>
    </header>
    <main class="cutiee-main">
        {% block content %}{% endblock %}
    </main>
    {% block extra_js %}{% endblock %}
</body>
</html>

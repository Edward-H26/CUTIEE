# Render deployment for CUTIEE.
#
# Single web service. The cross-process progress cache lives on the
# AuraDB instance we already pay for, so no Redis dyno is required.
# A lazy sweep on every publish drops snapshots older than 5 minutes
# and the post-finish purge drops them on the next HTMX poll, so the
# graph stays bounded for 2-5 concurrent demo users.

services:
  - type: web
    name: cutiee-web
    env: python
    region: oregon
    plan: starter
    buildCommand: |
      uv sync &&
      uv run python manage.py collectstatic --no-input &&
      uv run python -m agent.persistence.bootstrap
    startCommand: |
      uv run gunicorn cutiee_site.wsgi --bind 0.0.0.0:$PORT --workers 2 --threads 4
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: CUTIEE_ENV
        value: production
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: "cutiee-web.onrender.com,cutiee.onrender.com"
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: "https://cutiee-web.onrender.com,https://cutiee.onrender.com"
      - key: DJANGO_INTERNAL_DB_URL
        value: "sqlite:///data/django_internals.sqlite3"
      - key: GEMINI_API_KEY
        sync: false
      # Computer Use model. Defaults to gemini-flash-latest (auto-tracks
      # Google's current Flash). Pin to gemini-3-flash-preview for
      # deterministic replay across Google model swaps.
      - key: CUTIEE_CU_MODEL
        value: "gemini-flash-latest"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: NEO4J_BOLT_URL
        sync: false
      - key: NEO4J_USERNAME
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: NEO4J_DATABASE
        value: "neo4j"
      - key: CUTIEE_RECENCY_WINDOW
        value: "3"
      - key: CUTIEE_TEMPLATE_MATCH_THRESHOLD
        value: "0.85"
      - key: CUTIEE_REQUIRE_APPROVAL_HIGH_RISK
        value: "true"
      # Aura-backed progress: 30 ms / publish, no Redis dyno needed.
      # Demo-sized: lazy sweep + post-finish purge keep the graph bounded.
      - key: CUTIEE_PROGRESS_BACKEND
        value: "neo4j"
      # Demo posture: no chromium binary in the web tier, so every action
      # routes through StubBrowserController. To run against a real browser,
      # add `uv run playwright install chromium` to buildCommand and set
      # CUTIEE_USE_STUB_BROWSER=0 here.
      - key: CUTIEE_USE_STUB_BROWSER
        value: "true"
      - key: CUTIEE_CREDENTIAL_KEY
        sync: false

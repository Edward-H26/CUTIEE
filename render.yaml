# Render deployment for CUTIEE.
#
# Single web service. The cross-process progress cache lives on the
# AuraDB instance we already pay for, so no Redis dyno is required.
# A lazy sweep on every publish drops snapshots older than 5 minutes
# and the post-finish purge drops them on the next HTMX poll, so the
# graph stays bounded for 2-5 concurrent demo users.
#
# Django framework bookkeeping (contenttypes, auth_permission, allauth_*,
# sites, sessions) lives in a shared-cache in-memory SQLite hard-coded
# in cutiee_site/settings.py. Zero application data lives there: every
# domain entity round-trips through Neo4j via Cypher in apps/*/repo.py.
# Therefore no DJANGO_INTERNAL_DB_URL env var is needed or honoured.

services:
  - type: web
    name: cutiee-web
    env: python
    region: oregon
    # Standard plan (2 GB RAM) is the floor for real Chromium. Starter's
    # 512 MB OOM-kills the browser on the first heavy page.
    plan: standard
    buildCommand: |
      uv sync &&
      uv run playwright install chromium &&
      uv run python manage.py migrate --no-input &&
      uv run python manage.py collectstatic --no-input &&
      uv run python -m agent.persistence.bootstrap
    # Single worker keeps Chromium memory bounded. Threads still fan out
    # for HTMX polls and other non-CU requests.
    startCommand: |
      uv run gunicorn cutiee_site.wsgi --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120
    autoDeploy: true
    envVars:
      # Python 3.12 is the current Render default; matches the local
      # dev venv (3.13) closely enough for build artifacts to be
      # interchangeable. Bump to 3.13 once Render makes it GA.
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: CUTIEE_ENV
        value: production
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: "cutiee-web.onrender.com,cutiee.onrender.com"
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: "https://cutiee-web.onrender.com,https://cutiee.onrender.com"
      # === Required secrets (paste in Render dashboard) ===
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: NEO4J_BOLT_URL
        sync: false
      - key: NEO4J_USERNAME
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      # === Computer Use tunables ===
      # Defaults to gemini-flash-latest (auto-tracks Google's current
      # Flash). Pin to gemini-3-flash-preview for deterministic replay
      # across Google model swaps.
      - key: CUTIEE_CU_MODEL
        value: "gemini-flash-latest"
      - key: NEO4J_DATABASE
        value: "neo4j"
      # Render dynos have no display server, so the browser must be
      # headless. The controller defaults to headed for the dev demo.
      - key: CUTIEE_BROWSER_HEADLESS
        value: "true"
      # Real Chromium drives the page via Playwright. The Standard
      # plan (2 GB) has the headroom; flip to "true" only for cost-only
      # demos that do not need a real browser.
      - key: CUTIEE_USE_STUB_BROWSER
        value: "false"
      # Aura-backed progress cache: 30 ms / publish, no Redis dyno needed.
      - key: CUTIEE_PROGRESS_BACKEND
        value: "neo4j"
      # === ACE / planner tunables (defaults are sane; override per env) ===
      - key: CUTIEE_RECENCY_WINDOW
        value: "3"
      - key: CUTIEE_TEMPLATE_MATCH_THRESHOLD
        value: "0.85"
      - key: CUTIEE_REQUIRE_APPROVAL_HIGH_RISK
        value: "true"
      # === Optional ===
      # CUTIEE_CREDENTIAL_KEY (Fernet) is only needed if you persist
      # user secrets via SemanticCredentialStore. Omit unless you've
      # explicitly wired that store; the rest of the agent works fine
      # without it. To enable: generate via
      #   `python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"`
      # then add the key to the Render dashboard as a secret.

<!doctype html><html><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Sans:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=block">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:40px 24px;background:var(--cutiee-bg-aurora);font-family:Inter,sans-serif}
.row{display:flex;gap:16px;align-items:center;flex-wrap:wrap}

/* iOS 26 Liquid Glass — all variants now equally transparent, matching the "Mark stale" ghost button */
.btn{
  position:relative;isolation:isolate;overflow:visible;
  display:inline-flex;align-items:center;gap:8px;
  padding:11px 22px;border-radius:999px;
  font-family:Inter,sans-serif;font-weight:600;font-size:14px;letter-spacing:-.1px;
  cursor:pointer;
  transition: transform .2s cubic-bezier(.2,.8,.2,1), box-shadow .3s cubic-bezier(.2,.8,.2,1), background .2s ease;
  backdrop-filter: blur(30px) saturate(180%);
  -webkit-backdrop-filter: blur(30px) saturate(180%);
  border:1px solid rgba(255,255,255,.28);
}
/* Crisp top-edge hairline — the "glass" tell */
.btn::before{
  content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;
  background:linear-gradient(180deg, rgba(255,255,255,.35) 0%, rgba(255,255,255,0) 32%);
  mix-blend-mode:screen;
}
/* Refraction line at top */
.btn::after{
  content:"";position:absolute;left:14%;right:14%;top:1px;height:1px;border-radius:1px;pointer-events:none;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,.75), transparent);
}
.btn:hover{ transform:translateY(-1px); }

/* PRIMARY — liquid glass, primary-blue tinted text.
   Slightly more opaque than ghost so CTAs read more solid. */
.cta{
  color:var(--cutiee-primary);
  background:
    linear-gradient(180deg, rgba(255,255,255,.42) 0%, rgba(255,255,255,.18) 60%, rgba(255,255,255,.28) 100%);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.55),
    inset 0 -1px 0 rgba(255,255,255,.12),
    0 1px 2px rgba(108,134,192,.08),
    0 6px 14px -6px rgba(108,134,192,.28);
}
.cta:hover{
  background:
    linear-gradient(180deg, rgba(108,134,192,.22) 0%, rgba(255,255,255,.12) 60%, rgba(108,134,192,.16) 100%);
}

/* GHOST — slightly softer but still readable */
.ghost{
  color:var(--cutiee-text);
  background:
    linear-gradient(180deg, rgba(255,255,255,.32) 0%, rgba(255,255,255,.12) 60%, rgba(255,255,255,.20) 100%);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.5),
    inset 0 -1px 0 rgba(255,255,255,.1),
    0 1px 2px rgba(108,134,192,.06),
    0 6px 14px -6px rgba(108,134,192,.22);
}
.ghost:hover{
  background:
    linear-gradient(180deg, rgba(255,255,255,.42) 0%, rgba(255,255,255,.18) 60%, rgba(255,255,255,.28) 100%);
}

.sm{padding:7px 14px;font-size:12px}
</style><style>html{visibility:hidden}html.fonts-ready{visibility:visible}</style><script>document.fonts.ready.then(()=>document.documentElement.classList.add('fonts-ready'));setTimeout(()=>document.documentElement.classList.add('fonts-ready'),1500);</script></head><body>
<div class="row">
  <button class="btn cta">Submit task</button>
  <button class="btn ghost">View cost dashboard</button>
  <button class="btn cta sm">Run now</button>
  <button class="btn ghost sm">Mark stale</button>
</div>
</body></html>

<!doctype html><html><head><meta charset="utf-8"><link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Sans:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=block">
<link rel="stylesheet" href="../colors_and_type.css"><style>body{margin:0;padding:28px;background:#fff;font-family:Inter,sans-serif}
.r{display:flex;gap:20px;align-items:center;color:#6C86C0}
.ic{width:28px;height:28px}
.l{font-size:11px;color:#64748b;font-family:var(--cutiee-font-mono);text-transform:uppercase;letter-spacing:.5px;margin-top:6px;text-align:center}
.cell{text-align:center}
.tile{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#6C86C0,#8B6CC0);display:flex;align-items:center;justify-content:center;color:#fff;font-family:"Instrument Sans";font-weight:700;font-size:18px}
</style><style>html{visibility:hidden}html.fonts-ready{visibility:visible}</style><script>document.fonts.ready.then(()=>document.documentElement.classList.add('fonts-ready'));setTimeout(()=>document.documentElement.classList.add('fonts-ready'),1500);</script></head><body>
<div class="r">
  <div class="cell"><img class="ic" src="../assets/icon-replay.svg"><div class="l">replay</div></div>
  <div class="cell"><img class="ic" src="../assets/icon-prune.svg"><div class="l">prune</div></div>
  <div class="cell"><img class="ic" src="../assets/icon-route.svg"><div class="l">route</div></div>
  <div class="cell"><img class="ic" src="../assets/icon-audit.svg"><div class="l">audit</div></div>
  <div class="cell"><div class="tile">P</div><div class="l">tile P</div></div>
  <div class="cell"><div class="tile">T</div><div class="l">tile T</div></div>
  <div class="cell"><div class="tile">M</div><div class="l">tile M</div></div>
</div>
</body></html>

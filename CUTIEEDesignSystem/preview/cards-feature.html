<!doctype html>
<html><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--mm-aurora);font-family:var(--mm-font-body);display:flex;gap:18px;align-items:center;}
  .card{flex:1;background:rgba(255,255,255,.55);backdrop-filter:saturate(150%) blur(20px);-webkit-backdrop-filter:saturate(150%) blur(20px);border:1px solid rgba(255,255,255,.55);border-radius:16px;padding:20px;box-shadow:0 12px 32px rgba(108,134,192,.08);}
  .tile{width:44px;height:44px;border-radius:12px;background:#6C86C0;display:flex;align-items:center;justify-content:center;margin-bottom:12px;box-shadow:0 4px 12px rgba(108,134,192,.25);}
  svg{stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;fill:none;}
  h3{margin:0 0 4px 0;font-family:var(--mm-font-display);font-weight:700;font-size:16px;color:#1C1E2E;}
  p{margin:0;font-size:13px;color:#6B7280;line-height:1.5;}
</style></head>
<body>
<div class="card">
  <div class="tile"><svg width="20" height="20" viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg></div>
  <h3>Intelligent Chat</h3>
  <p>Have natural conversations with an AI that remembers context.</p>
</div>
<div class="card">
  <div class="tile"><svg width="20" height="20" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div>
  <h3>Semantic Search</h3>
  <p>Meaning-based retrieval, not just keywords.</p>
</div>
</body></html>

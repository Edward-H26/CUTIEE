<!doctype html><html><head><meta charset="utf-8"><link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Sans:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=block">
<link rel="stylesheet" href="../colors_and_type.css"><style>body{margin:0;padding:24px;background:var(--cutiee-bg-aurora);font-family:Inter,sans-serif}
.row{display:grid;gap:10px;max-width:420px}
label{display:grid;gap:4px;font-size:12px;color:#64748b}
input,textarea,select{width:100%;padding:10px 12px;border-radius:12px;border:1px solid rgba(108,134,192,.18);background:rgba(255,255,255,.70);font-family:Inter;font-size:14px;color:#1e293b}
input:focus{outline:none;border-color:#6C86C0;box-shadow:0 0 0 3px rgba(108,134,192,.15)}
</style><style>html{visibility:hidden}html.fonts-ready{visibility:visible}</style><script>document.fonts.ready.then(()=>document.documentElement.classList.add('fonts-ready'));setTimeout(()=>document.documentElement.classList.add('fonts-ready'),1500);</script></head><body>
<div class="row">
<label>Describe the task<input placeholder="sort my Sheets by column B"></label>
<label>Starting URL<input value="https://docs.google.com/spreadsheets/…"></label>
<label>Model tier<select><option>Auto (route by difficulty)</option><option>Tier 1 only</option></select></label>
</div>
</body></html>

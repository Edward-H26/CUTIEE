<!doctype html><html><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Sans:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=block">
<link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:20px;background:#fff}
.row{display:flex;gap:12px}
.sw{flex:1;border-radius:12px;padding:14px;min-height:96px;display:flex;flex-direction:column;justify-content:space-between;border:1px solid #E5E5E5}
.sw .n{font-family:var(--cutiee-font-display);font-weight:700;font-size:14px}
.sw .h{font-family:var(--cutiee-font-mono);font-size:11px}
</style><style>html{visibility:hidden}html.fonts-ready{visibility:visible}</style><script>document.fonts.ready.then(()=>document.documentElement.classList.add('fonts-ready'));setTimeout(()=>document.documentElement.classList.add('fonts-ready'),1500);</script></head><body>
<!-- True neutral grays — no warm/cool cast (pure achromatic scale) -->
<div class="row">
  <div class="sw" style="background:#1F1F1F"><div class="n" style="color:#fff">Text</div><div class="h" style="color:#D4D4D4">#1F1F1F</div></div>
  <div class="sw" style="background:#6B6B6B"><div class="n" style="color:#fff">Text Muted</div><div class="h" style="color:#E5E5E5">#6B6B6B</div></div>
  <div class="sw" style="background:#9A9A9A"><div class="n" style="color:#fff">Text Soft</div><div class="h" style="color:#F5F5F5">#9A9A9A</div></div>
  <div class="sw" style="background:#F7F7F7"><div class="n" style="color:#1F1F1F">Page BG</div><div class="h" style="color:#6B6B6B">#F7F7F7</div></div>
  <div class="sw" style="background:#ffffff"><div class="n" style="color:#1F1F1F">Content</div><div class="h" style="color:#6B6B6B">#FFFFFF</div></div>
  <div class="sw" style="background:#E5E5E5"><div class="n" style="color:#1F1F1F">Hair</div><div class="h" style="color:#6B6B6B">#E5E5E5</div></div>
</div>
</body></html>

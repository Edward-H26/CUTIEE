<!doctype html><html><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Sans:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=block">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:24px;background:var(--cutiee-bg-aurora);font-family:Inter,sans-serif}
.b{
  padding:12px 16px;border-radius:12px;font-size:14px;
  border:1px solid rgba(108,134,192,.18);
  backdrop-filter:blur(20px);background:rgba(255,255,255,.55);
  margin-bottom:10px;display:flex;align-items:center;gap:12px;
}
.b.ok{background:rgba(34,197,94,.1);color:#166534;border-color:rgba(34,197,94,.35)}
.b.load{background:rgba(254,243,199,.7);color:#92400e;border-color:rgba(245,158,11,.4)}
.b.bad{background:rgba(254,226,226,.7);color:#991b1b;border-color:rgba(239,68,68,.4)}

/* Smaller dot (8px), single halo, much slower pulse — calmer signal */
.dot{
  position:relative;width:8px;height:8px;border-radius:50%;
  background:currentColor; flex-shrink:0;
  box-shadow:0 0 0 1.5px rgba(255,255,255,.6);
}
@keyframes ping {
  0%   { transform:scale(1);   opacity:.45; }
  75%  { transform:scale(2);   opacity:0;   }
  100% { transform:scale(2);   opacity:0;   }
}
.dot::before{
  content:""; position:absolute; inset:-2px; border-radius:50%;
  background:currentColor; opacity:.45;
  animation:ping 1.4s cubic-bezier(.2,.8,.2,1) infinite;
}
</style><style>html{visibility:hidden}html.fonts-ready{visibility:visible}</style><script>document.fonts.ready.then(()=>document.documentElement.classList.add('fonts-ready'));setTimeout(()=>document.documentElement.classList.add('fonts-ready'),1500);</script></head><body>
<div class="b ok"><span class="dot"></span>Qwen3.5 0.8B ready · routing enabled</div>
<div class="b load"><span class="dot"></span>Warming up Qwen3.5 0.8B…</div>
<div class="b bad"><span class="dot"></span>Model unavailable — falling back to Tier 4</div>
</body></html>

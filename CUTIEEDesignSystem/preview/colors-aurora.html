<!doctype html>
<html><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;}
  body{
    font-family:var(--mm-font-body);
    background:var(--mm-aurora);
    min-height:100vh;
    padding:28px 32px;
    box-sizing:border-box;
    display:flex;
    gap:20px;
    align-items:stretch;
  }
  .card{
    flex:1;
    border-radius:20px;
    padding:22px 24px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    min-height:420px;
    box-shadow:
      0 1px 0 rgba(255,255,255,.7) inset,
      0 14px 40px rgba(108,134,192,.10);
  }
  .card .label{
    font-family:var(--mm-font-display);
    font-weight:700;
    font-size:19px;
    letter-spacing:-.015em;
    color:#0f172a;
  }
  .card .code{
    font-family:var(--mm-font-mono);
    font-size:13px;
    color:#64748b;
    line-height:1.5;
  }

  /* 1 — Aurora BG: show aurora itself, no glass overlay */
  .card.aurora-bg{
    background:var(--mm-aurora);
    border:1px solid rgba(255,255,255,.6);
  }

  /* 2 — Glass light: subtle wash, lets aurora show through */
  .card.glass-light{
    background:rgba(255,255,255,.28);
    backdrop-filter:saturate(140%) blur(18px);
    -webkit-backdrop-filter:saturate(140%) blur(18px);
    border:1px solid rgba(255,255,255,.5);
  }

  /* 3 — Glass whisper: barely-there, almost pure aurora */
  .card.glass-whisper{
    background:rgba(255,255,255,.14);
    backdrop-filter:saturate(130%) blur(22px);
    -webkit-backdrop-filter:saturate(130%) blur(22px);
    border:1px solid rgba(255,255,255,.4);
  }

  /* 4 — Aurora Deep: darker, richer aurora (MIRA-style) */
  .card.aurora-deep{
    background:
      radial-gradient(ellipse 60% 50% at 85% 15%, rgba(230, 150, 175, 0.55) 0%, transparent 65%),
      radial-gradient(ellipse 75% 65% at 15% 45%, rgba(110, 155, 220, 0.70) 0%, transparent 65%),
      radial-gradient(ellipse 80% 70% at 55% 95%, rgba(170, 150, 215, 0.65) 0%, transparent 65%),
      linear-gradient(135deg, #b9c8e4 0%, #bfc6e1 30%, #c4bedc 60%, #bcb0d1 100%);
    border:1px solid rgba(255,255,255,.45);
    box-shadow:
      0 1px 0 rgba(255,255,255,.5) inset,
      0 18px 50px rgba(80,100,160,.22);
  }
  .card.aurora-deep .label{ color:#ffffff; }
  .card.aurora-deep .code{ color:rgba(255,255,255,.65); }
</style></head>
<body>
  <div class="card aurora-bg">
    <div class="label">Aurora BG</div>
    <div class="code">radial × 3 +<br>linear</div>
  </div>
  <div class="card glass-light">
    <div class="label">Glass · light</div>
    <div class="code">default card<br>surface</div>
  </div>
  <div class="card glass-whisper">
    <div class="label">Glass · whisper</div>
    <div class="code">barely-there<br>variant</div>
  </div>
  <div class="card aurora-deep">
    <div class="label">Aurora Deep</div>
    <div class="code">MIRA-style</div>
  </div>
</body></html>

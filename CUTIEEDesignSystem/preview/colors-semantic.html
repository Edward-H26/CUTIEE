<!doctype html><html><head><meta charset="utf-8"><link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Sans:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=block">
<link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:20px;background:#fff;font-family:var(--cutiee-font-body)}
.row{display:flex;gap:12px}
.sw{flex:1;border-radius:12px;padding:14px;min-height:96px;display:flex;flex-direction:column;justify-content:space-between;border:1px solid var(--cutiee-border)}
.n{font-family:var(--cutiee-font-display);font-weight:700;font-size:14px}
.h{font-family:var(--cutiee-font-mono);font-size:11px}
.pill{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
</style><style>html{visibility:hidden}html.fonts-ready{visibility:visible}</style><script>document.fonts.ready.then(()=>document.documentElement.classList.add('fonts-ready'));setTimeout(()=>document.documentElement.classList.add('fonts-ready'),1500);</script></head><body>
<div class="row">
  <div class="sw" style="background:rgba(34,197,94,0.10);color:#166534"><div class="n">Success</div><span class="pill" style="background:rgba(34,197,94,0.18)">ok</span><div class="h">#166534 · rgba(34,197,94,.10)</div></div>
  <div class="sw" style="background:rgba(254,243,199,0.70);color:#92400e"><div class="n">Warning</div><span class="pill" style="background:rgba(254,243,199,1)">medium</span><div class="h">#92400e</div></div>
  <div class="sw" style="background:rgba(254,226,226,0.70);color:#991b1b"><div class="n">Danger</div><span class="pill" style="background:rgba(254,226,226,1)">fail · high</span><div class="h">#991b1b</div></div>
  <div class="sw" style="background:rgba(108,134,192,0.15);color:#6C86C0"><div class="n">Info / Primary</div><span class="pill" style="background:rgba(108,134,192,0.22)">queued</span><div class="h">#6C86C0</div></div>
</div>
</body></html>

<!doctype html><html><head><meta charset="utf-8"><link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Sans:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=block">
<link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:20px;background:#fff}
.row{display:flex;gap:12px;align-items:stretch}
.sw{flex:1;border-radius:12px;padding:14px;min-height:96px;display:flex;flex-direction:column;justify-content:space-between;border:1px solid var(--cutiee-border);color:#fff}
.sw .n{font-family:var(--cutiee-font-display);font-weight:700;font-size:14px}
.sw .h{font-family:var(--cutiee-font-mono);font-size:11px;opacity:.85}
.dark{color:var(--cutiee-text)}
</style><style>html{visibility:hidden}html.fonts-ready{visibility:visible}</style><script>document.fonts.ready.then(()=>document.documentElement.classList.add('fonts-ready'));setTimeout(()=>document.documentElement.classList.add('fonts-ready'),1500);</script></head><body>
<div class="row">
  <div class="sw" style="background:#6C86C0"><div class="n">Primary</div><div class="h">#6C86C0</div></div>
  <div class="sw" style="background:#8B6CC0"><div class="n">Primary End</div><div class="h">#8B6CC0</div></div>
  <div class="sw" style="background:linear-gradient(90deg,#6C86C0,#8B6CC0)"><div class="n">Gradient</div><div class="h">90deg → violet</div></div>
  <div class="sw" style="background:#CF6CC0"><div class="n">Accent</div><div class="h">#CF6CC0</div></div>
  <div class="sw" style="background:#5A74AD"><div class="n">Hover</div><div class="h">#5A74AD</div></div>
  <div class="sw" style="background:#4A6399"><div class="n">Active</div><div class="h">#4A6399</div></div>
</div>
</body></html>

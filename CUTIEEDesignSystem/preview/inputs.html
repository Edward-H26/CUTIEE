<!doctype html>
<html><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:28px;background:#fff;font-family:var(--mm-font-body);display:flex;flex-direction:column;gap:14px;}
  label{font-size:12px;font-weight:600;color:#1C1E2E;margin-bottom:4px;display:block;}
  input{width:100%;background:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.4);border-radius:8px;padding:10px 12px;font-family:var(--mm-font-body);font-size:13px;color:#1C1E2E;outline:none;box-sizing:border-box;}
  .bg{background:linear-gradient(135deg,#e9f0fc,#e6dff0);padding:16px;border-radius:12px;}
  input.focus{border:2px solid #6C86C0;background:#fff;padding:9px 11px;}
  .pill{display:inline-flex;align-items:center;gap:8px;padding:6px 12px;border-radius:9999px;background:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.6);font-size:12px;color:#64748b;backdrop-filter:blur(8px);}
  .dot{width:8px;height:8px;border-radius:50%;background:#10b981;}
</style></head>
<body>
<div class="bg">
  <label>Group name</label>
  <input placeholder="Group name…">
</div>
<div class="bg">
  <label>Access key</label>
  <input class="focus" value="mem_7f3a1…" style="font-family:var(--mm-font-mono);">
</div>
<div><span class="pill"><span class="dot"></span>Memory-augmented AI, live for everyone</span></div>
</body></html>

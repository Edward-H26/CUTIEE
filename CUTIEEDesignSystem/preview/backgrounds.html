<!doctype html><html><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Sans:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=block">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:0;min-height:280px;background:var(--cutiee-bg-aurora);font-family:Inter,sans-serif}
.wrap{padding:28px 20px;display:flex;gap:16px;min-height:280px;align-items:stretch}

.glass{
  flex:1;position:relative;overflow:hidden;border-radius:18px;padding:18px;
  display:flex;flex-direction:column;justify-content:space-between;
  background:
    linear-gradient(180deg, rgba(255,255,255,.14) 0%, rgba(255,255,255,.03) 55%, rgba(255,255,255,.09) 100%);
  backdrop-filter: blur(34px) saturate(190%);
  -webkit-backdrop-filter: blur(34px) saturate(190%);
  border:1px solid rgba(255,255,255,.30);
  /* natural depth: subtle, no rotate; one soft contact shadow + one big diffuse floor */
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.55),
    0 1px 2px rgba(108,134,192,.10),
    0 8px 16px -4px rgba(108,134,192,.18),
    0 24px 48px -16px rgba(108,134,192,.25);
  transition: transform .5s cubic-bezier(.2,.8,.2,1), box-shadow .5s cubic-bezier(.2,.8,.2,1);
}
/* gentle lift on hover — no rotation, just vertical */
.glass:hover{
  transform: translateY(-3px);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.6),
    0 2px 4px rgba(108,134,192,.12),
    0 14px 28px -6px rgba(108,134,192,.22),
    0 40px 72px -24px rgba(108,134,192,.3);
}
/* specular sheen — softer, gradient-based, reads as natural light */
.glass::before{
  content:"";position:absolute;inset:0;pointer-events:none;border-radius:inherit;
  background:
    linear-gradient(160deg, rgba(255,255,255,.35) 0%, rgba(255,255,255,0) 35%),
    radial-gradient(90% 50% at 100% 100%, rgba(255,255,255,.10) 0%, transparent 60%);
  mix-blend-mode:screen;
}

.glass.mid{
  background:
    linear-gradient(180deg, rgba(255,255,255,.10) 0%, rgba(255,255,255,.02) 60%, rgba(255,255,255,.07) 100%);
}
.glass.strong{
  background:
    linear-gradient(180deg, rgba(255,255,255,.06) 0%, rgba(255,255,255,0) 60%, rgba(255,255,255,.04) 100%);
  border-color:rgba(255,255,255,.22);
}
.glass.deep{
  background:var(--cutiee-bg-aurora-deep);
  border-color:rgba(255,255,255,.18);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.15),
    0 1px 2px rgba(20,30,60,.25),
    0 8px 16px -4px rgba(20,30,60,.35),
    0 24px 48px -16px rgba(20,30,60,.45);
}
/* Soft, natural highlight for dark surface — no screen blend, no hot band */
.glass.deep::before{
  mix-blend-mode: normal;
  background:
    linear-gradient(180deg, rgba(255,255,255,.08) 0%, rgba(255,255,255,0) 35%);
  opacity: .7;
}

.l{position:relative;font-family:var(--cutiee-font-display, Manrope);font-weight:700;font-size:14px;color:var(--cutiee-text);text-shadow:0 1px 0 rgba(255,255,255,.4)}
.h{position:relative;font-family:var(--cutiee-font-mono, "JetBrains Mono");font-size:11px;color:var(--cutiee-text-muted)}
</style><style>html{visibility:hidden}html.fonts-ready{visibility:visible}</style><script>document.fonts.ready.then(()=>document.documentElement.classList.add('fonts-ready'));setTimeout(()=>document.documentElement.classList.add('fonts-ready'),1500);</script></head><body>
<div class="wrap">
  <div class="glass"><div class="l">Aurora BG</div><div class="h">radial × 3 + linear</div></div>
  <div class="glass mid"><div class="l">Glass · light</div><div class="h">default card surface</div></div>
  <div class="glass strong"><div class="l">Glass · whisper</div><div class="h">barely-there variant</div></div>
  <div class="glass deep"><div class="l" style="color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.22)">Aurora Deep</div><div class="h" style="color:rgba(255,255,255,.85)">MIRA-style</div></div>
</div>
</body></html>

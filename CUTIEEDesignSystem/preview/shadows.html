<!doctype html><html><head><meta charset="utf-8"><link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Sans:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=block">
<link rel="stylesheet" href="../colors_and_type.css"><style>body{margin:0;padding:28px;background:#fff;font-family:Inter,sans-serif}
.row{display:flex;gap:20px;align-items:flex-end}
.c{width:100px;height:100px;background:#fff;border-radius:16px}
.sm{box-shadow:0 4px 12px rgba(108,134,192,.10)}
.md{box-shadow:0 8px 20px rgba(108,134,192,.18)}
.lg{box-shadow:0 16px 32px rgba(108,134,192,.22)}
.l{font-family:var(--cutiee-font-mono);font-size:10px;color:#64748b;text-align:center;margin-top:8px;text-transform:uppercase;letter-spacing:.5px}
</style><style>html{visibility:hidden}html.fonts-ready{visibility:visible}</style><script>document.fonts.ready.then(()=>document.documentElement.classList.add('fonts-ready'));setTimeout(()=>document.documentElement.classList.add('fonts-ready'),1500);</script></head><body>
<div class="row">
<div><div class="c sm"></div><div class="l">shadow-sm · tinted</div></div>
<div><div class="c md"></div><div class="l">shadow-md</div></div>
<div><div class="c lg"></div><div class="l">shadow-lg</div></div>
</div>
</body></html>

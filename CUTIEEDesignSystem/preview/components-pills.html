<!doctype html><html><head><meta charset="utf-8"><link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Sans:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=block">
<link rel="stylesheet" href="../colors_and_type.css"><style>body{margin:0;padding:24px;background:var(--cutiee-bg-aurora);font-family:Inter,sans-serif}
.row{display:flex;gap:8px;flex-wrap:wrap}
.pill{display:inline-flex;align-items:center;gap:8px;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;background:rgba(108,134,192,.15);color:#6C86C0}
.pill.success{background:rgba(34,197,94,.12);color:#166534}
.pill.warn{background:rgba(254,243,199,.9);color:#92400e}
.pill.danger{background:rgba(254,226,226,.9);color:#991b1b}
.pill.accent{background:rgba(139,108,192,.12);color:#7c5ebf}
.tag{padding:3px 10px;border-radius:999px;background:rgba(139,108,192,.12);color:#7c5ebf;font-size:11px}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:currentColor}
</style><style>html{visibility:hidden}html.fonts-ready{visibility:visible}</style><script>document.fonts.ready.then(()=>document.documentElement.classList.add('fonts-ready'));setTimeout(()=>document.documentElement.classList.add('fonts-ready'),1500);</script></head><body>
<div class="row">
<span class="pill"><span class="dot"></span>queued</span>
<span class="pill success">ok</span>
<span class="pill warn">medium</span>
<span class="pill danger">fail · high</span>
<span class="pill accent">procedural</span>
<span class="tag">sheets</span>
<span class="tag">docs</span>
<span class="tag">sort</span>
</div>
</body></html>
